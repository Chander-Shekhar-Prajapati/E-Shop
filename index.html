<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>E-Shop | Modern Online Shopping Store</title>

    <meta
      name="description"
      content="E-Shop is a modern online shopping website built with React and Tailwind CSS. Explore fashion, electronics, accessories, and more at affordable prices."
    />

    <meta
      name="keywords"
      content="E-Shop, Online Shopping, React Ecommerce, Fashion Store, Clothing, Electronics, Tailwind CSS, React Store"
    />

    <meta name="author" content="Chander Shekhar" />

    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph -->
    <meta property="og:title" content="E-Shop | Modern Online Shopping Store" />

    <meta
      property="og:description"
      content="Discover premium fashion and lifestyle products with a modern shopping experience."
    />

    <meta property="og:type" content="website" />

    <meta property="og:image" content="/logo.png" />

    <meta property="og:url" content="https://your-domain.com" />

    <meta property="og:site_name" content="E-Shop" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="E-Shop | Modern Online Shopping Store"
    />

    <meta
      name="twitter:description"
      content="Explore premium products with a modern shopping experience."
    />

    <meta name="twitter:image" content="/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://your-domain.com/" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
